services:
  # ==============================
  # Infrastructure
  # ==============================

  postgres:
    image: public.ecr.aws/docker/library/postgres:15
    container_name: cancer-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "55432:5432" # Keep exposed for user direct access if needed
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init_db.sql
      - ./scripts/create_model_versions_table.sql:/docker-entrypoint-initdb.d/02_model_versions_migration.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: cancer-cache
    # No port 6379 exposed to host (Internal only)
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  bigquery-local:
    image: public.ecr.aws/docker/library/postgres:15
    container_name: cancer-warehouse
    environment:
      POSTGRES_USER: ${WAREHOUSE_USER}
      POSTGRES_PASSWORD: ${WAREHOUSE_PASSWORD}
      POSTGRES_DB: ${WAREHOUSE_DB}
    ports:
      - "5433:5432"
    volumes:
      - warehouse_data:/var/lib/postgresql/data

  # ==============================
  # API Gateway / BFF
  # ==============================

  bff-service:
    build: ./services/bff-service
    container_name: bff-service
    ports:
      - "8000:8000" # THE ONLY PUBLIC API PORT
    environment:
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      PREDICTION_SERVICE_URL: ${PREDICTION_SERVICE_URL}
    depends_on:
      auth-service:
        condition: service_started
      prediction-service:
        condition: service_started

  # ==============================
  # Microservices (Private Networking)
  # ==============================

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    working_dir: /app
    volumes:
      - ./services/auth-service:/app
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  prediction-service:
    build:
      context: .
      dockerfile: services/prediction-service/Dockerfile
    container_name: prediction-service
    working_dir: /app
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      MODEL_MANAGEMENT_URL: ${MODEL_MANAGEMENT_URL}
      PYTHONPATH: /app:/shared/shared-transformers
    volumes:
      - ./services/prediction-service:/app
      - ./ml-pipeline:/ml-pipeline
      - ./shared/shared-transformers:/shared/shared-transformers
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  model-management-service:
    build: ./services/model-management-service
    container_name: model-management-service
    working_dir: /app
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      MODEL_STORAGE_PATH: ${MODEL_STORAGE_PATH}
    volumes:
      - ./services/model-management-service:/app
      - ./ml-pipeline:/ml-pipeline
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  warehouse_data:
